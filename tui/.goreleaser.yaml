# GoReleaser config for the chubby-tui binary.
#
# What this produces on a tag-triggered release (v0.2.0):
#   chubby-tui_0.2.0_darwin_amd64.tar.gz
#   chubby-tui_0.2.0_darwin_arm64.tar.gz
#   chubby-tui_0.2.0_linux_amd64.tar.gz
#   chubby-tui_0.2.0_linux_arm64.tar.gz
#   checksums.txt
#
# Windows is intentionally skipped â€” chubbyd uses Unix sockets and
# os.forkpty, so the daemon side has no Windows port. Shipping a
# windows-only TUI binary would talk to nothing.
#
# Local dry-run:    goreleaser release --snapshot --clean
# CI invocation:    goreleaser release --clean   (after a tag push)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: chubby-tui
    main: ./cmd/chubby-tui
    binary: chubby-tui
    env:
      - CGO_ENABLED=0
    ldflags:
      # Inject the tag's stripped version (no leading "v") into
      # main.Version. -s -w drops debug info and symbol tables to
      # shave a few MB off the tarball â€” chubby-tui doesn't ship a
      # crash reporter so symbols are dead weight.
      - -s -w -X main.Version={{.Version}} -X main.Commit={{.Commit}}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64

archives:
  - formats: [tar.gz]
    # Pin the asset basename to chubby-tui_â€¦ (not the go.mod module
    # name) so the python wrapper's --force-download URL builder
    # has a stable filename to construct.
    name_template: >-
      chubby-tui_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  # Group conventional-commit messages by type so the GitHub release
  # body reads as a real changelog instead of a flat list of shas.
  # The previous default-grouped output was just "<sha> <subject>"
  # per line, which is useless for someone landing on the release
  # page wondering "what's new". Buckets here mirror the conventional-
  # commits taxonomy chubby's commits actually use.
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+?\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+?\))??!?:.+$'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+?\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request

release:
  github:
    owner: talmes1502
    name: chubby
  # Publish directly so the on-startup update prompt and ``chubby
  # update`` in users' shells see the new release as soon as the
  # workflow finishes â€” no manual "publish draft" step. To stage
  # a release without making it visible, tag a prerelease form
  # like ``v0.1.3-rc1`` and ``prerelease: auto`` will mark it as
  # such (most consumers' update logic skips prereleases).
  draft: false
  prerelease: auto
  name_template: 'v{{ .Version }}'
  # Header / footer wrap the auto-generated changelog. Header
  # explains how to install or upgrade so a friend who lands on the
  # release page from a shared link doesn't need to dig through the
  # README; footer points at the install script for the curl-pipe
  # crowd.
  header: |
    ## Install or upgrade

    ```
    curl -fsSL https://raw.githubusercontent.com/talmes1502/chubby/main/install.sh | bash
    ```

    Already on chubby? Either run `chubby update` or just `chubby start` â€”
    the auto-update flow (v0.1.15+) will fetch this version on next launch.

    ## What's new
  footer: |
    ---
    [install.sh source](https://github.com/talmes1502/chubby/blob/main/install.sh) Â·
    [previous release](https://github.com/talmes1502/chubby/releases)
