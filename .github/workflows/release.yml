# Tag-triggered release. Author flow:
#
#   git tag v0.1.2 && git push --tags
#
# That's it. This workflow runs goreleaser in the tui/ subdir, picks
# up the tag's version via {{.Version}}, builds darwin/linux × amd64/
# arm64 binaries, uploads them to a new GitHub release alongside
# checksums.txt, and that release becomes the next thing the
# install.sh API call resolves to "latest".
#
# The Python wheel does not need this workflow — pipx installs from
# git+URL pull whatever's at HEAD of main. hatch-vcs derives the
# version from the same tag at build time.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create the release + upload assets

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser needs full history for changelog generation.
          fetch-depth: 0

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: tui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
